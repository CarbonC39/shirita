name: desktop-build

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: macos-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (webkit2gtk 4.1)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci
        working-directory: shirita-ui

      - name: Build frontend
        run: npm run build
        working-directory: shirita-ui

      - name: Tauri build (unsigned)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: shirita-tauri
        # 永不签名：不注入任何证书 secret。

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: shirita-${{ matrix.platform }}
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: shirita-*
          path: release-artifacts

      - name: Flatten for release
        run: |
          mkdir -p upload
          find release-artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.msi" \) -exec cp {} upload/ \;
          ls -la upload/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: upload/*
          generate_release_notes: true
